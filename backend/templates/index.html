<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMDb AI Assistant</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#121212] flex items-center justify-center h-screen text-white">

  <div class="w-full max-w-2xl h-[600px] bg-[#1e1e1e] shadow-lg rounded-2xl flex flex-col">

    <!-- Header -->
    <div class="p-4 border-b border-gray-700 flex items-center gap-2">
      <div class="bg-yellow-400 text-black font-bold px-2 py-1 rounded">
        IMDb AI
      </div>
      <span class="text-gray-300 text-sm">Movie Database Assistant</span>
    </div>

    <!-- Chat messages -->
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4">

      <!-- Welcome message -->
      <div class="flex justify-start">
        <div class="bg-black-700 text-white px-4 py-2 rounded-lg max-w-xs">
          👋 Hello! I’m your IMDb assistant.  
          Ask me anything about movies, ratings, actors, or genres!
        </div>
      </div>

    </div>

    <!-- Input -->
    <form action="/ask" method="post">
      <div class="border-t border-gray-700 p-3 flex items-center gap-2">

        <!-- Input -->
        <input
          type="text"
          name="question"
          id="message-input"
          placeholder="Ask about movies... "
          class="flex-1 bg-[#2a2a2a] text-white border border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400"
        />

        <!-- Send Button -->
        <button
          type="submit"
          id="submit-btn"
          class="bg-yellow-400 text-black px-4 py-2 rounded-lg hover:bg-yellow-300 font-semibold"
        >
          Send
        </button>

      </div>
    </form>

  </div>

  <script src="../static/script.js"></script>
</body>
