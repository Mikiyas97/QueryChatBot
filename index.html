<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>query</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div
    class="w-full max-w-2xl h-[600px] bg-white shadow-lg rounded-2xl flex flex-col"
  >
    <!-- Chat messages -->
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-2">
      <!-- Messages will appear here -->
    </div>

    <div class="border-t p-3 flex items-center gap-2">
      <!-- Hidden File Input -->
      <input type="file" id="file-input" class="hidden" />

      <!-- Custom Upload Button -->
      <label
        for="file-input"
        class="cursor-pointer bg-gray-200 hover:bg-gray-300 p-2 rounded-lg text-xl"
      >
        +
      </label>

      <!-- Text Input -->
      <input
        type="text"
        id="message-input"
        placeholder="Type a message..."
        class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <!-- Send Button -->
      <button
        id="submit-btn"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600"
      >
        Send
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
