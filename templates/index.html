<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>IMDb AI Assistant</title>
  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark')
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    /* Custom scrollbar for sidebar */
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.2); border-radius: 10px; }
    .sidebar-scroll:hover::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.4); }

    /* Mobile viewport height fix - accounts for browser chrome */
    .h-screen-safe {
      height: 100vh;
      height: 100dvh;
    }

    /* Ensure the body and html fill the viewport correctly */
    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* Prevent iOS rubber-banding on the body */
    body {
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    /* Make the textarea not zoom on iOS (font-size >= 16px) */
    #message-input {
      font-size: 16px;
    }

    /* Safe area padding for notched devices */
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
  </style>
</head>

<body class="bg-gray-50 dark:bg-[#121212] text-gray-900 dark:text-gray-100 font-sans selection:bg-yellow-400/30 transition-colors duration-300 overflow-hidden">

  <div class="flex h-screen-safe w-full">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 flex-shrink-0 bg-white dark:bg-[#181818] border-r border-gray-200 dark:border-white/5 flex flex-col transition-all duration-300 -ml-64 md:ml-0 fixed md:relative h-full z-40">
        <div class="p-4">
            <button id="new-chat-btn" class="w-full flex items-center gap-3 px-4 py-3 bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 border border-gray-200 dark:border-white/10 rounded-xl transition-all text-sm font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Chat
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto sidebar-scroll p-2 space-y-1" id="history-list">
            <!-- Chat history items will appear here -->
        </div>

        <div class="p-4 border-t border-gray-200 dark:border-white/5 space-y-2">
            <button id="theme-toggle-sidebar" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-100 dark:hover:bg-white/5 rounded-lg text-sm transition-colors text-gray-600 dark:text-gray-400">
                <span class="dark:hidden flex items-center gap-3"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Dark Mode</span>
                <span class="hidden dark:flex items-center gap-3"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Light Mode</span>
            </button>
        </div>
    </aside>

    <!-- Overlay for mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col relative w-full overflow-hidden min-h-0">
        
        <!-- Header -->
        <header class="px-4 py-3 md:px-6 md:py-4 flex justify-between items-center bg-gray-50/80 dark:bg-[#121212]/80 backdrop-blur-md sticky top-0 z-10 border-b border-gray-200 dark:border-white/5">
          <div class="flex items-center gap-3">
            <button id="sidebar-toggle" class="p-2 -ml-2 hover:bg-gray-200 dark:hover:bg-white/5 rounded-lg md:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="w-8 h-8 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-lg flex items-center justify-center shadow-lg shadow-yellow-400/20">
                <span class="text-black font-black text-xs">AI</span>
            </div>
            <h1 class="text-lg font-bold tracking-tight truncate max-w-[150px] sm:max-w-none">IMDb Assistant</h1>
          </div>
          <div class="flex items-center gap-2">
            <button id="upload-trigger" class="text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors p-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/5">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
          </div>
        </header>

        <!-- Chat messages -->
        <main id="chat-box" class="flex-1 overflow-y-auto px-3 sm:px-4 py-4 sm:py-8 space-y-6 sm:space-y-8 scroll-smooth min-h-0">
          <!-- Messages will be injected here -->
        </main>

        <!-- Loading Indicator -->
        <div id="loading-indicator" class="hidden px-4 py-4 max-w-3xl mx-auto flex gap-4">
            <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-800 flex-shrink-0 flex items-center justify-center text-xs animate-pulse">🤖</div>
            <div class="flex items-start gap-1 mt-3">
                <div class="w-1.5 h-1.5 bg-gray-400 dark:bg-gray-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 dark:bg-gray-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 dark:bg-gray-500 rounded-full animate-bounce"></div>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="flex-shrink-0 p-3 sm:p-6 bg-gradient-to-t from-gray-50 dark:from-[#121212] via-gray-50 dark:via-[#121212] to-transparent safe-bottom">
            <div class="max-w-3xl mx-auto relative group">
                <form id="chat-form" class="relative">
                    <input type="file" id="file-input" class="hidden">
                    <textarea
                      id="message-input"
                      rows="1"
                      placeholder="Ask anything about movies..."
                      class="w-full bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white rounded-2xl pl-3 sm:pl-4 pr-12 py-3 sm:py-4 focus:outline-none focus:ring-2 focus:ring-yellow-400/50 focus:border-yellow-400/50 transition-all resize-none shadow-xl dark:shadow-2xl text-base"
                    ></textarea>
                    
                    <button
                      type="submit"
                      id="submit-btn"
                      class="absolute right-2 bottom-2 sm:right-2.5 sm:bottom-2.5 p-2 bg-yellow-400 text-black rounded-xl hover:bg-yellow-300 transition-all disabled:opacity-50 disabled:cursor-not-allowed group shadow-lg"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </form>
            </div>
        </footer>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
